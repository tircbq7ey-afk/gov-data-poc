# nginx/default.conf

server {
  # 外向きポート（docker-compose で 8080 を公開）
  listen 8080;
  server_name _;

  # 受け付けるペイロードの上限（feedback などで JSON を送る想定）
  client_max_body_size 5m;

  # 圧縮
  gzip on;
  gzip_types
    application/json
    application/javascript
    text/plain
    text/css;

  # セキュリティ系ヘッダ（必要に応じて調整）
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  # 簡易 CORS（フロント／curl からのアクセス用）
  # * で問題なければこのまま。制限したい場合はオリジンを明示してください。
  add_header Access-Control-Allow-Origin * always;
  add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Content-Type, x-api-key" always;

  # Preflight
  if ($request_method = OPTIONS) {
    return 204;
  }

  # /health は明示的にプロキシ（ヘルスチェックの見栄えを良くするだけ。なくてもOK）
  location = /health {
    proxy_pass http://app:8010/health;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
  }

  # その他の API はすべて FastAPI(app:8010) へ
  location / {
    proxy_http_version 1.1;
    proxy_set_header Connection        "";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;

    proxy_pass http://app:8010;
  }
}
