services:
  app:
    # ローカルから必ずビルド（pull 不要）
    build:
      context: .
      dockerfile: Dockerfile
    # ビルドしたイメージに好きな名前を付けたい場合に備えて image も指定
    image: ${APP_IMAGE:-ghcr.io/${GHCR_OWNER:-tircbq7ey-afk}/gov-data-poc-app}:${APP_TAG:-latest}

    container_name: gov-data-poc-app-1
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: ${PORT:-8010}
      API_TOKEN: ${API_TOKEN:-changeme-local-token}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: /app/logs
      # コンテナ内の参照パスにマッピング
      TEXTS_JSON: /app/data/db/texts.json
      FAQ_JSON: /app/data/faq_vi.json
    volumes:
      - ./data:/app/data
      - ./logs_from_container:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8010/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  proxy:
    image: nginx:alpine
    container_name: gov-data-poc-proxy-1
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
