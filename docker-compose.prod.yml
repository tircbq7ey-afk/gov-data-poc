# docker-compose.prod.yml  ← UTF-8 (BOMなし)
services:
  app:
    image: ${APP_IMAGE:-ghcr.io/${GHCR_OWNER:-tircbq7ey-afk}/gov-data-poc-app:${APP_TAG:-latest}}
    container_name: gov-data-poc-app-1
    env_file: .env
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8010}
      - API_TOKEN=${API_TOKEN:-changeme-local-token}
      - TEXTS_JSON=${TEXTS_JSON:-/app/data/db/texts.json}
      - FAQ_JSON=${FAQ_JSON:-/app/data/faq_vi.json}
      - MIN_SCORE=${MIN_SCORE:-0.0}
      - TOP_K_DEFAULT=${TOP_K_DEFAULT:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=${LOG_DIR:-/app/logs}
      - VERSION=${APP_TAG:-latest}
    volumes:
      - ./data:/app/data
      - ./logs_from_container:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8010/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  proxy:
    image: nginx:alpine
    container_name: gov-data-poc-proxy-1
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
