# docker-compose.prod.yml 〈UTF-8（BOMなし）〉
services:
  app:
    image: ${APP_IMAGE:-ghcr.io/tircbq7ey-afk/gov-data-poc-app}:${APP_TAG:-latest}
    container_name: gov-data-poc-app-1
    env_file: .env
    environment:
      - HOST=0.0.0.0
      - PORT=8010
      - API_TOKEN=${API_TOKEN:-changeme-local-token}
      - TEXTS_JSON=/app/data/db/texts.json
      - FAQ_JSON=/app/data/faq.json
      - FAQ_JSON_VI=/app/data/faq_vi.json
      - FEEDBACK_DIR=/data/feedback
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - VERSION=${APP_TAG:-latest}
    volumes:
      - ./data:/app/data
      - ./data/feedback:/data/feedback
      - ./logs:/app/logs
    restart: unless-stopped

  proxy:
    image: caddy:2.8-alpine
    container_name: gov-data-poc-proxy-1
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/caddy/Caddyfile:ro
      - ./logs:/var/log/caddy
    depends_on:
      - app
    restart: unless-stopped
