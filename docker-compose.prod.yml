# docker-compose.prod.yml  ← UTF-8（BOMなし）
services:
  app:
    # GHCRからのpullは使わず、ローカルでビルドして使う
    build:
      context: .
      dockerfile: Dockerfile
    image: gov-data-poc-app:local        # ローカルタグ
    container_name: gov-data-poc-app-1
    env_file: .env
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8010}
      - API_TOKEN=${API_TOKEN}
      - TEXTS_JSON=/app/data/db/texts.json
      - FAQ_JSON=/app/data/faq.json
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - VERSION=${VERSION:-dev}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    expose:
      - "8010"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8010/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  proxy:
    image: nginx:stable
    container_name: gov-data-poc-proxy-1
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
