# docker-compose.prod.yml  ← UTF-8 (BOMなし) で保存
services:
  app:
    image: ghcr.io/tircbq7ey-afk/gov-data-poc-app:latest
    container_name: gov-data-poc-app-1
    env_file: .env
    environment:
      - HOST=0.0.0.0
      - PORT=8010
      - API_TOKEN=${API_TOKEN:-changeme-local-token}
      - TEXTS_JSON=/app/data/db/texts.json
      - FAQ_JSON=/app/data/faq.json
      - FAQ_JSON_VI=/app/data/faq_vi.json
      - FEEDBACK_DIR=/data/feedback
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - VERSION=${APP_TAG:-v0.1.3}
    volumes:
      - ./data:/app/data
      - ./data/feedback:/data/feedback
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8010/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [gov-data-poc-net]

  proxy:
    image: nginx:alpine
    container_name: gov-data-poc-proxy-1
    depends_on:
      app:
        condition: service_healthy
    ports: ["8080:80"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [gov-data-poc-net]

networks:
  gov-data-poc-net: {}
